    <div class="lightbox" id="lightbox"><img src="" alt=""></div>

    <script>
        (function () {
            var lb = document.getElementById('lightbox');
            var lbImg = lb.querySelector('img');
            var close = function () { lb.classList.remove('open'); document.body.style.overflow = ''; };
            document.querySelectorAll('.photos .ph img').forEach(function (img) {
                var full = img.getAttribute('data-full') || img.src;
                var pre = new Image(); pre.src = full;   // preload so the zoom is instant
                img.parentElement.addEventListener('click', function (e) {
                    if (e.target.closest('a')) return;
                    lbImg.src = full;
                    lb.classList.add('open');
                    document.body.style.overflow = 'hidden';
                });
            });
            lb.addEventListener('click', close);
            document.addEventListener('keydown', function (e) { if (e.key === 'Escape') close(); });
        })();
    </script>
    <script src="cursor.js"></script>
